server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header Cross-Origin-Opener-Policy   "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";

    location ~* \.mjs$ {
        types { text/javascript mjs; }
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
